lula-version: ">=v0.2.0"
metadata:
  name: Validate pods with label foo=bar
  uuid: 7f4c3b2a-1c3d-4a2b-8b64-3b1f76a8e36f
domain:
  type: kubernetes
  kubernetes-spec:
    resources:
      - name: podsvt
        resource-rule:
          name: podsvt
          version: v1
          resource: pods
          namespaces: [validation-test]
provider:
  type: opa
  opa-spec:
    rego: |
      package validate

      import future.keywords.every

      validate {
        every pod in input.podsvt {
          podLabel := pod.metadata.labels.foo
          podLabel == "bar"
        }
      }
